<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Creador de posts · Il Raviolo Bottega</title>
<meta name="theme-color" content="#0c2440">
<link rel="manifest" href="creador.webmanifest">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0c2440;--gold:#e8b84f;--bg:#eef0f4;--panel:#fff;--line:#e4e7ee;--muted:#7a8699}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font-family:'Poppins',system-ui,sans-serif;background:var(--bg);color:var(--navy);display:flex;flex-direction:column;height:100vh;overflow:hidden}
  header{background:linear-gradient(180deg,#0c2440,#06182c);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px;flex:0 0 auto}
  header img{width:34px;height:34px;border-radius:8px}
  header b{font-size:15px}header span{font-size:11px;color:#cdd6e4}
  .main{flex:1;display:flex;min-height:0}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;background:#dfe3ea;overflow:auto}
  canvas{max-width:100%;max-height:100%;box-shadow:0 10px 40px rgba(0,0,0,.25);border-radius:6px;background:#fff}
  .panel{width:330px;flex:0 0 330px;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:14px}
  .grp{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
  .grp h3{margin:0 0 8px;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
  label{display:block;font-size:12px;font-weight:600;margin:8px 0 3px}
  input[type=text],select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px;font:inherit;font-size:13px}
  textarea{resize:vertical;min-height:46px}
  .row{display:flex;gap:8px;flex-wrap:wrap}.row>*{flex:1}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 6px;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .sw{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .sw button{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer}
  .cc{display:flex;align-items:center;gap:8px}.cc input[type=color]{width:38px;height:34px;border:1px solid var(--line);border-radius:8px;padding:2px;background:#fff}
  input[type=range]{width:100%}
  .chk{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-top:6px}
  .dl{position:sticky;bottom:0;background:var(--panel);padding-top:8px}
  .dl button{width:100%;background:var(--gold);color:var(--navy);border:0;border-radius:11px;padding:13px;font:inherit;font-weight:800;font-size:15px;cursor:pointer}
  .hint{font-size:11px;color:var(--muted);margin-top:4px}
  /* mobile */
  @media(max-width:780px){ .main{flex-direction:column} .panel{width:100%;flex:1 1 auto;border-left:0;border-top:1px solid var(--line)} .stage{flex:0 0 42vh} }
</style>
</head>
<body>
<header>
  <img src="https://ilraviolo.es/assets/logo.webp" alt="">
  <div><b>Creador de posts</b><br><span>Il Raviolo Bottega · ilraviolo.es/bottega</span></div>
</header>
<div class="main">
  <div class="stage"><canvas id="cv" width="1080" height="1350"></canvas></div>
  <div class="panel">
    <div class="grp"><h3>Formato</h3>
      <div class="seg" id="fmt">
        <button data-w="1080" data-h="1080">Cuadrado</button>
        <button data-w="1080" data-h="1350" class="on">Post 4:5</button>
        <button data-w="1080" data-h="1920">Story</button>
      </div>
    </div>
    <div class="grp"><h3>Estilo</h3>
      <div class="seg" id="style">
        <button data-s="immersive" class="on">Foto inmersiva</button>
        <button data-s="card">Tarjeta</button>
      </div>
      <div class="hint">"Inmersiva" = foto a tutto schermo con testo sopra (più d'impatto). "Tarjeta" = foto in riquadro.</div>
    </div>
    <div class="grp"><h3>Contenido</h3>
      <label>Producto del catálogo</label>
      <select id="prod"><option value="">— Personalizado —</option></select>
      <label>Foto</label>
      <input type="file" id="file" accept="image/*">
      <div class="hint">Per scaricare, meglio caricare la foto dal dispositivo (le foto del catalogo a volte si bloccano).</div>
      <label>Etiqueta (badge)</label><input type="text" id="badge" value="PRODUCTO DEL DÍA">
      <label>Categoría</label><input type="text" id="cat" value="EMBUTIDOS">
      <label>Título (producto)</label><input type="text" id="title" value="Salame ungherese">
      <label>Precio</label><input type="text" id="price" value="3,00 €">
      <label>Pie</label><input type="text" id="foot" value="WhatsApp 671 085 862 · ilraviolo.es/bottega">
    </div>
    <div class="grp"><h3>Fondo</h3>
      <div class="sw" id="bgpre"></div>
      <div class="row" style="margin-top:8px">
        <div><label>Color</label><div class="cc"><input type="color" id="bg1" value="#0c2440"></div></div>
        <div><label>Color 2</label><div class="cc"><input type="color" id="bg2" value="#06182c"></div></div>
      </div>
      <div class="chk"><input type="checkbox" id="grad" checked><label style="margin:0">Degradado</label></div>
      <div class="chk"><input type="checkbox" id="wm" checked><label style="margin:0">Motivo del logo de fondo</label></div>
      <label>Intensidad del motivo</label><input type="range" id="wmO" min="0" max="30" value="10">
    </div>
    <div class="grp"><h3>Texto</h3>
      <div class="row">
        <div><label>Color texto</label><div class="cc"><input type="color" id="tc" value="#ffffff"></div></div>
        <div><label>Color acento</label><div class="cc"><input type="color" id="ac" value="#e8b84f"></div></div>
      </div>
      <label>Fuente del título</label>
      <select id="font"><option value="Anton">Anton (impacto)</option><option value="Playfair Display">Playfair (elegante)</option><option value="Poppins">Poppins (limpio)</option></select>
      <label>Tamaño del título</label><input type="range" id="ts" min="60" max="150" value="104">
    </div>
    <div class="dl"><button id="dl">⬇ Descargar PNG</button></div>
  </div>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const $=id=>document.getElementById(id);
const cfg={w:1080,h:1350,style:'immersive',badge:'PRODUCTO DEL DÍA',cat:'EMBUTIDOS',title:'Salame ungherese',price:'3,00 €',
  foot:'WhatsApp 671 085 862 · ilraviolo.es/bottega',bg1:'#0c2440',bg2:'#06182c',grad:true,wm:true,wmO:10,tc:'#ffffff',ac:'#e8b84f',font:'Anton',ts:104};
let photo=null, logo=new Image(); logo.crossOrigin='anonymous'; logo.src='https://ilraviolo.es/assets/logo.webp'; logo.onload=render; logo.onerror=()=>{logo=null;render()};

const PRESETS=[['#0c2440','#06182c'],['#14365c','#0a2138'],['#e8b84f','#cf9d35'],['#f0cd76','#c9962e'],['#2a1a12','#0d0907'],['#3a0f12','#1a0708'],['#1d3b2a','#0c1f16'],['#f4ece0','#e7d9c4']];
const bgpre=$('bgpre');PRESETS.forEach(p=>{const b=document.createElement('button');b.style.background=`linear-gradient(135deg,${p[0]},${p[1]})`;b.onclick=()=>{cfg.bg1=p[0];cfg.bg2=p[1];$('bg1').value=p[0];$('bg2').value=p[1];const light=isLight(p[0]);cfg.tc=light?'#0c2440':'#ffffff';$('tc').value=cfg.tc;render()};bgpre.appendChild(b)});
function isLight(hex){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return (0.299*r+0.587*g+0.114*b)>150}

// catálogo
fetch('https://aiseller-blackstar.vercel.app/api/ilraviolo').then(r=>r.json()).then(c=>{
  (c.products||[]).forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=p.name;o._p=p;$('prod').appendChild(o)});
  window._cat=c.products||[];
}).catch(()=>{});
$('prod').onchange=e=>{const p=(window._cat||[])[e.target.value];if(!p)return;
  cfg.title=p.name;$('title').value=p.name;cfg.cat=(p.category||'').toUpperCase();$('cat').value=cfg.cat;
  const pr=(parseFloat(String(p.price).replace(',','.'))||0).toFixed(2).replace('.',',')+' €';cfg.price=pr;$('price').value=pr;
  if(p.imageUrl){const im=new Image();im.crossOrigin='anonymous';im.onload=()=>{photo=im;render()};im.onerror=()=>{photo=null;render();alert('No se pudo cargar la foto del catálogo (CORS). Súbela desde tu dispositivo para poder descargar.')};im.src=p.imageUrl}
  render();
};
$('file').onchange=e=>{const f=e.target.files[0];if(!f)return;const im=new Image();im.onload=()=>{photo=im;render()};im.src=URL.createObjectURL(f)};

// bind controls
const bind=(id,key,ev='input',fn=v=>v)=>{$(id).addEventListener(ev,e=>{cfg[key]=fn(e.target.type==='checkbox'?e.target.checked:e.target.value);render()})};
['badge','cat','title','price','foot','bg1','bg2','tc','ac','font'].forEach(k=>bind(k,k));
bind('grad','grad');bind('wm','wm');bind('wmO','wmO',( 'input'),v=>+v);bind('ts','ts','input',v=>+v);
document.querySelectorAll('#fmt button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#fmt button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cfg.w=+b.dataset.w;cfg.h=+b.dataset.h;render()});
document.querySelectorAll('#style button').forEach(b=>b.onclick=()=>{document.querySelectorAll('#style button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cfg.style=b.dataset.s;render()});

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
function cover(img,x,y,w,h){const ir=img.width/img.height,r=w/h;let sw,sh,sx,sy;if(ir>r){sh=img.height;sw=sh*r;sx=(img.width-sw)/2;sy=0}else{sw=img.width;sh=sw/r;sx=0;sy=(img.height-sh)/2}ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h)}
function wrap(t,fs,ff,maxw){ctx.font=`${ff==='Anton'?'400':'800'} ${fs}px "${ff}"`;const words=String(t).split(/\s+/);let lines=[],cur='';for(const w of words){const tt=cur?cur+' '+w:w;if(ctx.measureText(tt).width>maxw&&cur){lines.push(cur);cur=w}else cur=tt}if(cur)lines.push(cur);return lines}

function render(){
  const W=cfg.w,H=cfg.h;cv.width=W;cv.height=H;
  // fondo
  if(cfg.grad){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,cfg.bg1);g.addColorStop(1,cfg.bg2);ctx.fillStyle=g}else ctx.fillStyle=cfg.bg1;
  ctx.fillRect(0,0,W,H);
  const M=Math.round(W*0.085);
  if(cfg.style==='card'){
    if(cfg.wm&&logo)tilePattern(W,H);
    drawHeader(W,M);
    const ph=Math.min(W-2*M,H*0.5),px=(W-ph)/2,py=Math.round(H*0.30);
    ctx.save();roundRect(px,py,ph,ph,40);ctx.fillStyle='#fff';ctx.fill();ctx.clip();if(photo)cover(photo,px,py,ph,ph);else{ctx.fillStyle='#f0eadf'}ctx.restore();
    ctx.save();roundRect(px,py,ph,ph,40);ctx.strokeStyle=cfg.ac;ctx.lineWidth=5;ctx.globalAlpha=.7;ctx.stroke();ctx.restore();
    drawTexts(W,H,M,py+ph+Math.round(H*0.05),false);
  } else {
    // inmersiva: foto full-bleed + scrim
    if(photo)cover(photo,0,0,W,H);else{const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,cfg.bg1);g.addColorStop(1,cfg.bg2);ctx.fillStyle=g;ctx.fillRect(0,0,W,H)}
    // scrim inferiore col colore di fondo
    const sg=ctx.createLinearGradient(0,H*0.30,0,H);sg.addColorStop(0,hexA(cfg.bg2,0));sg.addColorStop(.55,hexA(cfg.bg2,.78));sg.addColorStop(1,hexA(cfg.bg2,.98));ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);
    const tg=ctx.createLinearGradient(0,0,0,H*0.22);tg.addColorStop(0,hexA(cfg.bg2,.85));tg.addColorStop(1,hexA(cfg.bg2,0));ctx.fillStyle=tg;ctx.fillRect(0,0,W,H*0.22);
    drawHeader(W,M);
    drawTexts(W,H,M,null,true);
  }
}
function tilePattern(W,H){const t=176;ctx.globalAlpha=cfg.wmO/100;for(let y=10;y<H;y+=t)for(let x=10;x<W;x+=t)ctx.drawImage(logo,x,y,128,128);ctx.globalAlpha=1}
function drawHeader(W,M){
  let y=Math.round(M*1.0);
  if(logo){const ls=Math.round(W*0.13);ctx.drawImage(logo,(W-ls)/2,y,ls,ls);y+=ls+18}
  ctx.fillStyle=cfg.tc;ctx.textAlign='center';ctx.font=`700 ${Math.round(W*0.042)}px Poppins`;
  ctx.save();ctx.translate(W/2,y+Math.round(W*0.03));spacedText('IL RAVIOLO BOTTEGA',6);ctx.restore();
  y+=Math.round(W*0.075);
  // badge
  const bt=cfg.badge.toUpperCase();ctx.font=`700 ${Math.round(W*0.036)}px Poppins`;const bw=ctx.measureText(bt).width+letters(bt,3)+70,bh=Math.round(W*0.072);
  roundRect((W-bw)/2,y,bw,bh,bh/2);ctx.fillStyle=cfg.ac;ctx.fill();
  ctx.fillStyle=contrast(cfg.ac);ctx.save();ctx.translate(W/2,y+bh/2+Math.round(W*0.013));spacedText(bt,3);ctx.restore();
}
function drawTexts(W,H,M,topY,immersive){
  ctx.textAlign='center';
  const maxw=W-2*M;
  const titleLines=wrap(cfg.title,cfg.ts*(W/1080),cfg.font,maxw).slice(0,3);
  const tlh=cfg.ts*(W/1080)*1.04;
  const priceFs=Math.round(W*0.115),catFs=Math.round(W*0.036);
  const blockH=catFs+22+titleLines.length*tlh+priceFs+40;
  let y= immersive ? (H-Math.round(M*0.9)-blockH+catFs) : (topY+catFs);
  // categoría
  ctx.fillStyle=cfg.ac;ctx.font=`700 ${catFs}px Poppins`;ctx.save();ctx.translate(W/2,y);spacedText(cfg.cat.toUpperCase(),5);ctx.restore();
  y+=22+tlh*0.75;
  // título
  ctx.fillStyle=cfg.tc;ctx.font=`${cfg.font==='Anton'?'400':'800'} ${cfg.ts*(W/1080)}px "${cfg.font}"`;
  titleLines.forEach((l,i)=>{ctx.fillText(l,W/2,y+i*tlh)});
  y+=(titleLines.length-1)*tlh+priceFs*0.92;
  // precio
  ctx.fillStyle=cfg.ac;ctx.font=`800 ${priceFs}px Poppins`;ctx.fillText(cfg.price,W/2,y);
  // pie
  ctx.fillStyle=cfg.tc;ctx.globalAlpha=.92;ctx.font=`600 ${Math.round(W*0.032)}px Poppins`;ctx.fillText(cfg.foot,W/2,H-Math.round(M*0.55));ctx.globalAlpha=1;
}
function spacedText(t,sp){const fs=parseInt(ctx.font);let total=0;for(const ch of t)total+=ctx.measureText(ch).width+sp;total-=sp;let x=-total/2;ctx.textAlign='left';for(const ch of t){ctx.fillText(ch,x,0);x+=ctx.measureText(ch).width+sp}ctx.textAlign='center'}
function letters(t,sp){return (t.length-1)*sp}
function hexA(hex,a){const c=hex.replace('#','');return `rgba(${parseInt(c.substr(0,2),16)},${parseInt(c.substr(2,2),16)},${parseInt(c.substr(4,2),16)},${a})`}
function contrast(hex){return isLight(hex)?'#0c2440':'#ffffff'}

$('dl').onclick=()=>{try{const a=document.createElement('a');a.download='ilraviolo-post.png';a.href=cv.toDataURL('image/png');a.click()}catch(e){alert('Para descargar, sube la foto desde tu dispositivo (la del catálogo está bloqueada por seguridad del navegador).')}};
// precompila dal plan.html ("Abrir en el editor")
try{ if(location.hash.length>2){const h=JSON.parse(decodeURIComponent(location.hash.slice(1)));
  if(h.title){cfg.title=h.title;$('title').value=h.title}
  if(h.price){cfg.price=h.price;$('price').value=h.price}
  if(h.cat){cfg.cat=h.cat;$('cat').value=h.cat}
  if(h.theme==='gold'){cfg.bg1='#e8b84f';cfg.bg2='#cf9d35';cfg.tc='#0c2440';cfg.ac='#0c2440';$('bg1').value='#e8b84f';$('bg2').value='#cf9d35';$('tc').value='#0c2440';$('ac').value='#0c2440'}
  if(h.img){const im=new Image();im.crossOrigin='anonymous';im.onload=()=>{photo=im;render()};im.onerror=()=>{};im.src=h.img}
}}catch(e){}
document.fonts.ready.then(render);setTimeout(render,400);
if('serviceWorker' in navigator&&location.protocol.startsWith('http')){navigator.serviceWorker.register('panel-sw.js').catch(()=>{})}
</script>
</body>
</html>
