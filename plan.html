<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Plan anual · Il Raviolo Bottega</title>
<meta name="theme-color" content="#0c2440">
<link rel="manifest" href="plan.webmanifest">
<style>
  :root{--navy:#0c2440;--navy2:#06182c;--gold:#e8b84f;--bg:#eef0f4;--card:#fff;--line:#e4e7ee;--muted:#7a8699}
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--navy);padding-bottom:env(safe-area-inset-bottom)}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--navy),var(--navy2));color:#fff;padding:12px 16px;display:flex;align-items:center;gap:10px}
  header img{width:36px;height:36px;border-radius:8px}header b{font-size:15px}header span{font-size:11px;color:#cdd6e4}
  .wrap{max-width:1000px;margin:0 auto;padding:14px}
  .bar{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 12px}
  .bar h2{font-size:18px;margin:0;text-transform:capitalize}
  .bar button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 12px;font:inherit;font-weight:700;cursor:pointer}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .dow span{font-size:11px;font-weight:700;color:var(--muted);text-align:center;text-transform:uppercase}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cell{background:var(--card);border-radius:11px;min-height:96px;padding:7px;cursor:pointer;border:1px solid var(--line);position:relative;transition:.12s;display:flex;flex-direction:column;gap:3px}
  .cell:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(12,36,64,.12)}
  .cell.empty{background:transparent;border:0;cursor:default}
  .cell .dn{font-size:12px;font-weight:800;color:var(--muted)}
  .cell.today{outline:2px solid var(--gold)}
  .cell .pill{font-size:10px;font-weight:700;color:#b98f25;line-height:1.1}
  .cell .pr{font-size:11.5px;font-weight:600;line-height:1.15;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .dot{position:absolute;top:8px;right:8px;width:9px;height:9px;border-radius:50%}
  .dot.blue{background:var(--navy)}.dot.gold{background:var(--gold)}
  .edited{position:absolute;bottom:7px;right:8px;font-size:9px;background:#e7f0ff;color:#2f6fd0;padding:1px 5px;border-radius:8px;font-weight:700}
  .legend{font-size:11px;color:var(--muted);margin:12px 2px}
  dialog{border:0;border-radius:18px;padding:0;max-width:560px;width:94%}
  dialog::backdrop{background:rgba(6,24,44,.55)}
  .dh{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:var(--navy);color:#fff}
  .dh b{font-size:15px}.x{background:0;border:0;color:#fff;font-size:22px;cursor:pointer}
  .db{padding:16px;max-height:74vh;overflow:auto}
  label{display:block;font-size:12px;font-weight:700;margin:9px 0 3px}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px;font:inherit;font-size:13px}
  textarea{min-height:90px;resize:vertical}
  .row{display:flex;gap:8px}.row>*{flex:1}
  .acts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .acts button,.acts a{flex:1;text-align:center;text-decoration:none;border:0;border-radius:10px;padding:11px;font:inherit;font-weight:800;cursor:pointer;font-size:13px}
  .save{background:var(--gold);color:var(--navy)}.open{background:var(--navy);color:#fff}.reset{background:#f0f0f3;color:#444;flex:0 0 auto}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:22px}
</style>
</head>
<body>
<header><img src="https://ilraviolo.es/assets/logo.webp" alt=""><div><b>Plan anual de publicaciones</b><br><span>Il Raviolo Bottega · cada día ya pre-creado y editable</span></div></header>
<div class="wrap">
  <div class="bar"><button onclick="move(-1)">‹ Mes anterior</button><h2 id="month">—</h2><button onclick="move(1)">Mes siguiente ›</button></div>
  <div class="dow"><span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span></div>
  <div class="cal" id="cal"></div>
  <div class="legend">🔵 fondo azul · 🟡 fondo oro · Toca un día para ver y <b>editar</b> el post ya creado. Los cambios se guardan en este dispositivo.</div>
</div>
<dialog id="dlg"><div class="dh"><b id="dT">—</b><button class="x" onclick="dlg.close()">✕</button></div>
  <div class="db" id="dB"></div>
</dialog>
<footer>Made in Italy — Blackstar Digital Studio</footer>
<script>
const API='https://aiseller-blackstar.vercel.app/api/ilraviolo';
const WA='671 085 862', SITE='ilraviolo.es/bottega', CITY='Las Palmas de Gran Canaria';
const CAT_ORDER=['Pasta fresca','Embutidos','Quesos','Salsas','Trufa','Postres','Focaccia y pizza','Plato preparado','Bebidas','Vino biodinámico','Licores','Horno','Pane','Harinas','Complementos'];
const catIdx=c=>{const i=CAT_ORDER.indexOf(c);return i<0?99:i};
const HASH={brand:['#IlRavioloBottega','#RavioloBottega','#ProductoDelDíaRaviolo','#LaBottegaItaliana'],
  local:['#LasPalmas','#LasPalmasDeGranCanaria','#GranCanaria','#Canarias','#LPGC','#ComerEnLasPalmas','#GranCanariaFoodie','#CanariasGastronomía'],
  general:['#ComidaItaliana','#CocinaItaliana','#HechoEnItalia','#ProductoItaliano','#DelicatessenItaliana','#SaboresDeItalia'],
  cat:{'Pasta fresca':['#PastaFresca','#PastaArtesanal'],'Embutidos':['#Embutidos','#SalumiItaliani'],'Quesos':['#Quesos','#FormaggiItaliani'],'Salsas':['#SalsaItaliana','#Pesto'],'Trufa':['#Trufa','#Tartufo'],'Postres':['#PostresItalianos','#Dolci'],'Focaccia y pizza':['#Focaccia','#PizzaArtesanal'],'Plato preparado':['#ComidaCasera','#PlatosItalianos'],'Bebidas':['#VinoItaliano','#Maridaje'],'Vino biodinámico':['#VinoNatural'],'Licores':['#LicorItaliano'],'Horno':['#PanArtesano'],'Pane':['#PaneItaliano'],'Complementos':['#GourmetItaliano']}};
// pilastri editoriali per giorno della settimana (0=Dom..6=Sáb)
const PILLARS={1:{l:'Lunes de pasta',cat:'Pasta fresca',intro:'Lunes de pasta fresca 🍝'},
  2:{l:'Producto del día',cat:null,intro:'Producto del día'},
  3:{l:'Detrás de la bottega',cat:null,bts:true,intro:'Hoy en la bottega 👀'},
  4:{l:'Maridaje',cat:'Quesos',intro:'El maridaje perfecto 🧀🍷'},
  5:{l:'Plan de finde',cat:'Focaccia y pizza',intro:'Plan de finde 🍕'},
  6:{l:'Tabla italiana',cat:'Embutidos',intro:'Tabla para compartir 🥓'},
  0:{l:'Domingo dulce',cat:'Postres',intro:'Domingo dulce 🍰'}};
const rot=(a,n,k)=>Array.from({length:Math.min(k,a.length)},(_,i)=>a[(n+i)%a.length]);
const fmt=v=>{const n=parseFloat(String(v).replace(',','.'));return (isFinite(n)?n:0).toFixed(2).replace('.',',')+' €'};
const key=d=>'raviolo-plan-'+d.toISOString().slice(0,10);
const dayNum=d=>Math.floor(d.getTime()/864e5);
let PROD=[],BYCAT={},cur=new Date();cur.setDate(1);

function pickFor(d){ // contenuto pre-creato per la data
  const dn=dayNum(d),wd=d.getDay(),p=PILLARS[wd],theme=(dn%6)<3?'blue':'gold';
  let prod=null;
  if(p.cat&&BYCAT[p.cat]&&BYCAT[p.cat].length){const list=BYCAT[p.cat];prod=list[Math.floor(dn/1)%list.length]}
  if(!prod&&PROD.length)prod=PROD[dn%PROD.length];
  const cats=prod?(HASH.cat[prod.category]||['#GourmetItaliano']):['#GourmetItaliano'];
  const tags=[...HASH.brand,...cats,...rot(HASH.local,dn,4),...rot(HASH.general,dn,2)];
  const title=prod?prod.name:'';
  const price=prod?fmt(prod.price):'';
  let cap;
  if(p.bts){cap=`${p.intro}\n\nDetrás de cada producto hay tradición italiana y trabajo artesanal. ¿Quieres saber qué preparamos hoy?\n\nPídelo por WhatsApp 📲 ${WA}\n📍 ${CITY} · ${SITE}`}
  else{cap=`${p.intro}: ${title} — ${price}\n${prod?prod.category:''} · recién hecho\n\n¿Te lo guardo? Pídelo por WhatsApp 📲 ${WA}\n📍 ${CITY} · ${SITE}`}
  return {pillar:p.l,theme,category:prod?prod.category:'',title,price,image:prod?prod.imageUrl:'',caption:cap,tags:tags.join(' ')};
}
function dataFor(d){const saved=localStorage.getItem(key(d));const base=pickFor(d);if(saved){try{return {...base,...JSON.parse(saved),_edited:true}}catch(e){}}return base}

function render(){
  document.getElementById('month').textContent=cur.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const cal=document.getElementById('cal');cal.innerHTML='';
  const first=new Date(cur),y=first.getFullYear(),m=first.getMonth();
  let lead=(first.getDay()+6)%7; // lun=0
  for(let i=0;i<lead;i++){const e=document.createElement('div');e.className='cell empty';cal.appendChild(e)}
  const todayS=new Date().toISOString().slice(0,10);
  const dim=new Date(y,m+1,0).getDate();
  for(let day=1;day<=dim;day++){const d=new Date(y,m,day);const inf=dataFor(d);
    const c=document.createElement('div');c.className='cell'+(d.toISOString().slice(0,10)===todayS?' today':'');
    c.innerHTML=`<span class="dn">${day}</span><span class="dot ${inf.theme}"></span>
      <span class="pill">${inf.pillar}</span><span class="pr">${inf.title||'—'}</span>${inf._edited?'<span class="edited">editado</span>':''}`;
    c.onclick=()=>openDay(d);cal.appendChild(c);
  }
}
function move(n){cur.setMonth(cur.getMonth()+n);render()}

function openDay(d){const inf=dataFor(d);const ds=d.toISOString().slice(0,10);
  document.getElementById('dT').textContent=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dB').innerHTML=`
    <label>Pilar del día</label><input id="f_pillar" value="${esc(inf.pillar)}">
    <div class="row"><div><label>Título / producto</label><input id="f_title" value="${esc(inf.title)}"></div>
      <div><label>Precio</label><input id="f_price" value="${esc(inf.price)}"></div></div>
    <div class="row"><div><label>Categoría</label><input id="f_cat" value="${esc(inf.category)}"></div>
      <div><label>Fondo</label><select id="f_theme"><option value="blue"${inf.theme==='blue'?' selected':''}>Azul</option><option value="gold"${inf.theme==='gold'?' selected':''}>Oro</option></select></div></div>
    <label>Texto del post</label><textarea id="f_cap">${esc(inf.caption)}</textarea>
    <label>Hashtags</label><textarea id="f_tags" style="min-height:60px">${esc(inf.tags)}</textarea>
    <div class="acts">
      <button class="save" onclick="saveDay('${ds}')">💾 Guardar cambios</button>
      <a class="open" id="openEd">🎨 Abrir en el editor</a>
      <button class="reset" onclick="resetDay('${ds}')">↺</button>
    </div>
    <div style="font-size:11px;color:#7a8699;margin-top:8px">Lo cambi e salvi: questo giorno userà il tuo testo al posto di quello automatico.</div>`;
  document.getElementById('openEd').href='creador.html#'+encodeURIComponent(JSON.stringify({title:inf.title,price:inf.price,cat:(inf.category||'').toUpperCase(),img:inf.image,theme:inf.theme}));
  window._curD=d;document.getElementById('dlg').showModal();
}
function val(id){return document.getElementById(id).value}
function saveDay(ds){const d=new Date(ds);
  const obj={pillar:val('f_pillar'),title:val('f_title'),price:val('f_price'),category:val('f_cat'),theme:val('f_theme'),caption:val('f_cap'),tags:val('f_tags')};
  localStorage.setItem(key(d),JSON.stringify(obj));document.getElementById('dlg').close();render();toast('Guardado ✓');
}
function resetDay(ds){const d=new Date(ds);localStorage.removeItem(key(d));document.getElementById('dlg').close();render();toast('Restablecido')}
function esc(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function toast(m){const e=document.createElement('div');e.textContent=m;e.style.cssText='position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#0c2440;color:#fff;padding:10px 18px;border-radius:22px;font-weight:700;z-index:99';document.body.appendChild(e);setTimeout(()=>e.remove(),1300)}

fetch(API).then(r=>r.json()).then(c=>{PROD=(c.products||[]).filter(p=>p.imageUrl);PROD.sort((a,b)=>catIdx(a.category)-catIdx(b.category)||String(a.name).localeCompare(b.name));
  BYCAT={};PROD.forEach(p=>{(BYCAT[p.category]=BYCAT[p.category]||[]).push(p)});render();
}).catch(()=>{document.getElementById('cal').innerHTML='<div style="padding:20px;color:#7a8699">No se pudo cargar el catálogo.</div>'});
if('serviceWorker' in navigator&&location.protocol.startsWith('http')){navigator.serviceWorker.register('panel-sw.js').catch(()=>{})}
</script>
</body>
</html>
