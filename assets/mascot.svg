<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480" role="img" aria-label="Kaya the reggae elf mascot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff6e6"/>
      <stop offset="1" stop-color="#f4e4c4"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6c89a"/>
      <stop offset="1" stop-color="#e0a877"/>
    </linearGradient>
    <linearGradient id="beanie" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f7d32"/>
      <stop offset="0.5" stop-color="#fbb102"/>
      <stop offset="1" stop-color="#ab2e31"/>
    </linearGradient>
    <clipPath id="badgeClip"><rect x="24" y="24" width="432" height="432" rx="96"/></clipPath>
  </defs>

  <!-- Badge background -->
  <rect x="24" y="24" width="432" height="432" rx="96" fill="url(#bg)"/>
  <g clip-path="url(#badgeClip)">

    <!-- Rasta tri-color arc halo behind head -->
    <g opacity="0.9">
      <path d="M70 250 A170 170 0 0 1 410 250 L372 250 A132 132 0 0 0 108 250 Z" fill="#2f7d32"/>
      <path d="M108 250 A132 132 0 0 1 372 250 L334 250 A94 94 0 0 0 146 250 Z" fill="#fbb102"/>
      <path d="M146 250 A94 94 0 0 1 334 250 L296 250 A56 56 0 0 0 184 250 Z" fill="#ab2e31"/>
    </g>
    <!-- soft floor shadow -->
    <ellipse cx="240" cy="452" rx="150" ry="26" fill="#d8b98a" opacity="0.5"/>

    <!-- ===== DREADLOCKS (back layer) ===== -->
    <g fill="#3a2a1c">
      <path d="M150 175 C112 200 96 250 104 312 C110 360 128 392 150 420 L182 410 C158 372 150 320 152 270 C154 228 162 196 178 178 Z"/>
      <path d="M330 175 C368 200 384 250 376 312 C370 360 352 392 330 420 L298 410 C322 372 330 320 328 270 C326 228 318 196 302 178 Z"/>
      <path d="M132 205 C104 240 96 300 110 360 L138 352 C124 300 128 248 150 214 Z"/>
      <path d="M348 205 C376 240 384 300 370 360 L342 352 C356 300 352 248 330 214 Z"/>
    </g>
    <!-- dread highlights -->
    <g fill="#5a4129">
      <path d="M168 200 C150 245 148 320 168 392 L180 388 C162 318 164 246 180 206 Z"/>
      <path d="M312 200 C330 245 332 320 312 392 L300 388 C318 318 316 246 300 206 Z"/>
      <path d="M120 235 C108 285 112 335 124 372 L132 368 C120 332 118 286 130 240 Z"/>
    </g>
    <!-- dread bead segment lines -->
    <g stroke="#2a1d12" stroke-width="3" stroke-linecap="round" opacity="0.55">
      <path d="M124 250 H150 M122 300 H150 M126 350 H152" fill="none"/>
      <path d="M330 250 H356 M330 300 H358 M328 350 H354" fill="none"/>
    </g>
    <!-- BEADS on dreads -->
    <g>
      <circle cx="135" cy="378" r="13" fill="#ab2e31"/><circle cx="135" cy="378" r="5" fill="#fff6e6" opacity="0.5"/>
      <circle cx="170" cy="402" r="12" fill="#fbb102"/><circle cx="170" cy="402" r="4.5" fill="#fff6e6" opacity="0.5"/>
      <circle cx="345" cy="378" r="13" fill="#2f7d32"/><circle cx="345" cy="378" r="5" fill="#fff6e6" opacity="0.5"/>
      <circle cx="310" cy="402" r="12" fill="#fbb102"/><circle cx="310" cy="402" r="4.5" fill="#fff6e6" opacity="0.5"/>
      <circle cx="118" cy="340" r="10" fill="#2f7d32"/>
      <circle cx="362" cy="340" r="10" fill="#ab2e31"/>
    </g>

    <!-- ===== BODY / GARMENT ===== -->
    <path d="M150 470 C150 392 184 360 240 360 C296 360 330 392 330 470 Z" fill="#ab2e31"/>
    <path d="M150 470 C150 392 184 360 240 360 C268 360 290 368 306 384 L290 470 Z" fill="#8f2528" opacity="0.45"/>
    <!-- collar -->
    <path d="M205 366 C218 392 262 392 275 366 C262 380 218 380 205 366 Z" fill="#fff6e6" opacity="0.85"/>
    <!-- garment hemp-leaf pin -->
    <g transform="translate(290 408) scale(0.8)" fill="#fbb102">
      <path d="M0 -14 C4 -6 4 0 0 6 C-4 0 -4 -6 0 -14 Z"/>
      <path d="M0 4 C8 -2 13 -2 16 6 C9 8 3 8 0 4 Z"/>
      <path d="M0 4 C-8 -2 -13 -2 -16 6 C-9 8 -3 8 0 4 Z"/>
    </g>

    <!-- ===== NECK ===== -->
    <path d="M212 318 L212 372 C212 388 268 388 268 372 L268 318 Z" fill="url(#skin)"/>
    <path d="M212 322 C212 348 268 348 268 322 L268 340 C268 360 212 360 212 340 Z" fill="#c98a55" opacity="0.4"/>

    <!-- ===== EARS (pointed elf) ===== -->
    <g fill="url(#skin)">
      <path d="M158 218 C140 196 132 174 142 162 C152 152 172 168 184 196 Z"/>
      <path d="M322 218 C340 196 348 174 338 162 C328 152 308 168 296 196 Z"/>
    </g>
    <path d="M160 208 C150 192 146 178 152 172 C160 168 170 182 178 200 Z" fill="#c98a55" opacity="0.5"/>
    <path d="M320 208 C330 192 334 178 328 172 C320 168 310 182 302 200 Z" fill="#c98a55" opacity="0.5"/>

    <!-- ===== FACE ===== -->
    <path d="M168 232 C168 168 200 132 240 132 C280 132 312 168 312 232 C312 290 282 326 240 326 C198 326 168 290 168 232 Z" fill="url(#skin)"/>
    <!-- jaw/cheek soft shade -->
    <path d="M176 250 C182 300 210 322 240 322 C270 322 298 300 304 250 C300 296 274 314 240 314 C206 314 180 296 176 250 Z" fill="#c98a55" opacity="0.3"/>

    <!-- brows -->
    <path d="M188 212 C202 202 220 204 230 212" stroke="#2a1d12" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M292 212 C278 202 260 204 250 212" stroke="#2a1d12" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- eyes (relaxed half-lidded chill) -->
    <g>
      <ellipse cx="207" cy="236" rx="20" ry="17" fill="#fff6e6"/>
      <ellipse cx="273" cy="236" rx="20" ry="17" fill="#fff6e6"/>
      <!-- upper lids lowered -->
      <path d="M187 230 C197 220 217 220 227 230 L227 224 C217 218 197 218 187 224 Z" fill="#e0a877"/>
      <path d="M253 230 C263 220 283 220 293 230 L293 224 C283 218 263 218 253 224 Z" fill="#e0a877"/>
      <circle cx="210" cy="239" r="11" fill="#4a2f1a"/>
      <circle cx="270" cy="239" r="11" fill="#4a2f1a"/>
      <circle cx="210" cy="239" r="5" fill="#1a0f08"/>
      <circle cx="270" cy="239" r="5" fill="#1a0f08"/>
      <circle cx="214" cy="235" r="3.5" fill="#fff6e6"/>
      <circle cx="274" cy="235" r="3.5" fill="#fff6e6"/>
      <!-- lash lines -->
      <path d="M187 233 C197 226 217 226 227 233" stroke="#2a1d12" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M253 233 C263 226 283 226 293 233" stroke="#2a1d12" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </g>

    <!-- cheek blush -->
    <ellipse cx="192" cy="268" rx="16" ry="10" fill="#e07a55" opacity="0.35"/>
    <ellipse cx="288" cy="268" rx="16" ry="10" fill="#e07a55" opacity="0.35"/>

    <!-- nose -->
    <path d="M240 248 C235 262 232 272 240 278 C248 272 245 262 240 248 Z" fill="#d98a4a" opacity="0.6"/>

    <!-- warm friendly smile -->
    <path d="M212 288 C228 304 252 304 268 288 C254 300 226 300 212 288 Z" fill="#7a3b2a"/>
    <path d="M212 288 C228 300 252 300 268 288" stroke="#5e2c1f" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M218 290 C230 296 250 296 262 290 L258 293 C248 297 232 297 222 293 Z" fill="#fff6e6"/>

    <!-- gold hoop earring on left ear -->
    <circle cx="166" cy="232" r="10" fill="none" stroke="#fbb102" stroke-width="5"/>

    <!-- ===== HAIR FRONT / FRINGE under beanie ===== -->
    <path d="M168 196 C172 168 200 150 240 150 C280 150 308 168 312 196 C300 184 286 180 272 188 C264 174 252 168 240 168 C228 168 216 174 208 188 C194 180 180 184 168 196 Z" fill="#3a2a1c"/>
    <path d="M180 192 C188 178 198 176 206 184 M300 192 C292 178 282 176 274 184" stroke="#5a4129" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- ===== BEANIE (rasta slouch) ===== -->
    <path d="M158 188 C158 120 198 86 240 86 C282 86 322 120 322 188 C300 162 278 152 240 152 C202 152 180 162 158 188 Z" fill="url(#beanie)"/>
    <!-- ribbed brim -->
    <path d="M156 184 C156 168 178 156 240 156 C302 156 324 168 324 184 C324 196 306 200 240 200 C174 200 156 196 156 184 Z" fill="#1e5e22"/>
    <g stroke="#15441a" stroke-width="3" opacity="0.7">
      <path d="M176 162 V196 M198 158 V198 M222 156 V199 M246 156 V199 M270 157 V198 M294 160 V196 M310 165 V192"/>
    </g>
    <!-- beanie stripe shading bands -->
    <path d="M158 188 C158 150 178 124 206 108 C190 130 184 160 188 184 C176 168 168 174 158 188 Z" fill="#256b28" opacity="0.5"/>
    <path d="M322 188 C322 150 302 124 274 108 C290 130 296 160 292 184 C304 168 312 174 322 188 Z" fill="#8f2528" opacity="0.4"/>
    <!-- slouch top fold -->
    <path d="M205 92 C220 84 260 84 275 92 C262 100 218 100 205 92 Z" fill="#fbb102"/>
    <ellipse cx="240" cy="90" rx="20" ry="11" fill="#d99400"/>

    <!-- hemp/CBD leaf pin on beanie -->
    <g transform="translate(298 150) rotate(20)" fill="#9fcf6a" stroke="#2f7d32" stroke-width="2">
      <path d="M0 -22 C5 -10 5 -2 0 8 C-5 -2 -5 -10 0 -22 Z"/>
      <path d="M0 4 C12 -3 20 -3 26 8 C14 12 4 11 0 6 Z"/>
      <path d="M0 4 C-12 -3 -20 -3 -26 8 C-14 12 -4 11 0 6 Z"/>
      <path d="M0 2 C9 6 14 14 16 24 C7 21 2 12 0 6 Z"/>
      <path d="M0 2 C-9 6 -14 14 -16 24 C-7 21 -2 12 0 6 Z"/>
    </g>

    <!-- ===== RAISED HAND (irie / peace gesture) lower-left ===== -->
    <g>
      <path d="M86 470 L86 410 C86 386 104 372 124 376 C120 360 130 348 144 350 C140 338 150 330 162 334 L168 360 C176 350 190 352 192 366 L196 392 C200 384 212 384 214 396 L216 470 Z" fill="url(#skin)"/>
      <!-- finger separations -->
      <g stroke="#c98a55" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7">
        <path d="M150 352 L156 392"/>
        <path d="M170 360 L176 396"/>
        <path d="M190 372 L194 402"/>
      </g>
      <!-- wrist band rasta -->
      <path d="M96 416 L210 416 L210 432 L96 432 Z" fill="#fbb102"/>
      <path d="M96 416 L210 416 L210 422 L96 422 Z" fill="#2f7d32"/>
      <path d="M96 426 L210 426 L210 432 L96 432 Z" fill="#ab2e31"/>
    </g>

  </g>
  <!-- badge outline -->
  <rect x="24" y="24" width="432" height="432" rx="96" fill="none" stroke="#2f7d32" stroke-width="8"/>
  <rect x="34" y="34" width="412" height="412" rx="86" fill="none" stroke="#fbb102" stroke-width="3" opacity="0.7"/>
</svg>
