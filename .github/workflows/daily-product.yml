name: Producto del dia

# Ogni mattina alle ~09:00 ora spagnola (07:00 UTC; in inverno ~08:00).
# Sceglie il prodotto del giorno (rotazione), genera la storia, la pubblica su
# Instagram/Facebook Stories, la mette in evidenza nel catalogo e lascia il link
# pubblico pronto per lo Stato WhatsApp. Avviabile anche a mano.
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Prodotto del giorno → Stories + catalogo
        run: node scripts/daily-stories.mjs
        env:
          ILRAVIOLO_SUPABASE_KEY: ${{ secrets.ILRAVIOLO_SUPABASE_KEY }}
          META_ACCESS_TOKEN:      ${{ secrets.META_ACCESS_TOKEN }}
          WA_CATALOG_ID:          ${{ secrets.WA_CATALOG_ID }}
          BLOB_READ_WRITE_TOKEN:  ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          IG_USER_ID:             ${{ secrets.IG_USER_ID }}
          FB_PAGE_ID:             ${{ secrets.FB_PAGE_ID }}
