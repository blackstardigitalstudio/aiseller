name: Deploy AI Seller Home (Cloudflare Pages)

# Progetto Cloudflare Pages DEDICATO al chatbot AI Seller dell'utente: separato da
# Kayaman (aiseller.pages.dev) e da Il Raviolo (ilraviolo.pages.dev).
# Contiene la home + i 3 strumenti (studio, pannello, installa), autonomi.
# URL: https://aiseller-home.pages.dev  (la home e' chatbot-home.html come index). Made in Italy.
on:
  push:
    branches: [main]
    paths:
      - "chatbot-home.html"
      - "chatbot-home.webmanifest"
      - "studio.html"
      - "pannello.html"
      - "installa.html"
      - ".github/workflows/deploy-aiseller-home.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dist AI Seller Home
        run: |
          mkdir -p site
          cp chatbot-home.html site/index.html
          cp studio.html pannello.html installa.html site/
          cp chatbot-home.webmanifest site/
          ls -la site

      - name: Crea il progetto Pages "aiseller-home" se non esiste
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3.90.0 pages project create aiseller-home --production-branch=main || echo "progetto gia' esistente, proseguo"

      - name: Deploy to Cloudflare Pages (progetto aiseller-home)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=aiseller-home --branch=main
