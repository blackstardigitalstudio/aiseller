name: Deploy to Cloudflare Pages

# Ad ogni push su main, ricostruisce la cartella runtime e la pubblica su Cloudflare Pages.
# Così aggiorno i bot "da dietro" con un semplice git push — niente token a mano, niente Vercel.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build runtime (dist/)
        run: |
          mkdir -p dist
          cp widget.js index.html app.js styles.css config.js _headers pannello.html aiseller-htaccess.txt installa.html studio.html hub.html manifest.json shop.html dist/
          cp -r clients assets data dist/
          ls -la dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=aiseller --branch=main
