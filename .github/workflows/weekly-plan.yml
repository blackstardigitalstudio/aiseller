name: Plan semanal

# Motore settimanale (gratis, a regole): ogni domenica rigenera il piano dei 7 giorni.
on:
  schedule:
    - cron: "0 6 * * 0"   # domenica 06:00 UTC
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci || npm install
      - name: Genera piano settimanale
        run: node scripts/weekly-plan.mjs
        env:
          ILRAVIOLO_SUPABASE_KEY: ${{ secrets.ILRAVIOLO_SUPABASE_KEY }}
          BLOB_READ_WRITE_TOKEN:  ${{ secrets.BLOB_READ_WRITE_TOKEN }}
