name: Deploy Il Raviolo (Cloudflare Pages)

# Progetto Cloudflare Pages DEDICATO a Il Raviolo Bottega: separato da Kayaman.
# Pubblica SOLO il pannello di controllo (hub/plan/creador/reportes/ajustes/panel)
# + il catalogo statico generato da Supabase. URL: https://ilraviolo.pages.dev
# La hub è anche la home (index.html). Made in Italy.
on:
  push:
    branches: [main]
    paths:
      - "hub.html"
      - "plan.html"
      - "creador.html"
      - "reportes.html"
      - "ajustes.html"
      - "panel.html"
      - "*.webmanifest"
      - "panel-sw.js"
      - "clients/ilraviolo.json"
      - "scripts/build-catalog.mjs"
      - ".github/workflows/deploy-raviolo.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Genera catalogo statico da Supabase (data/catalog.json)
        env:
          ILRAVIOLO_SUPABASE_KEY: ${{ secrets.ILRAVIOLO_SUPABASE_KEY }}
        run: node scripts/build-catalog.mjs

      - name: Build dist Il Raviolo
        run: |
          mkdir -p site/data site/clients
          cp hub.html plan.html creador.html reportes.html ajustes.html panel.html site/
          cp hub.webmanifest plan.webmanifest creador.webmanifest reportes.webmanifest ajustes.webmanifest panel.webmanifest panel-sw.js site/
          cp hub.html site/index.html
          cp clients/ilraviolo.json site/clients/
          if [ -f data/catalog.json ]; then cp data/catalog.json site/data/; fi
          ls -la site site/data

      - name: Deploy to Cloudflare Pages (progetto ilraviolo)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=ilraviolo --branch=main
