name: Sync WhatsApp Catalog

# Aggiorna il catalogo WhatsApp ogni 3 ore (stesso ritmo del chatbot)
# o manualmente da GitHub Actions > Run workflow
on:
  schedule:
    - cron: "30 */3 * * *"   # offset di 30 min rispetto al chatbot sync
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync prodotti → catalogo WhatsApp
        run: node scripts/sync-wa-catalog.mjs
        env:
          ILRAVIOLO_SUPABASE_KEY: ${{ secrets.ILRAVIOLO_SUPABASE_KEY }}
          META_ACCESS_TOKEN:      ${{ secrets.META_ACCESS_TOKEN }}
          WA_CATALOG_ID:          ${{ secrets.WA_CATALOG_ID }}

      # TEMP: prova reale del "prodotto del giorno" (solo su avvio manuale). Da rimuovere dopo.
      - name: Install deps (one-off)
        if: github.event_name == 'workflow_dispatch'
        run: npm ci || npm install
      - name: Prodotto del giorno (one-off prova)
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/daily-stories.mjs
        env:
          ILRAVIOLO_SUPABASE_KEY: ${{ secrets.ILRAVIOLO_SUPABASE_KEY }}
          META_ACCESS_TOKEN:      ${{ secrets.META_ACCESS_TOKEN }}
          WA_CATALOG_ID:          ${{ secrets.WA_CATALOG_ID }}
          BLOB_READ_WRITE_TOKEN:  ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          IG_USER_ID:             ${{ secrets.IG_USER_ID }}
          FB_PAGE_ID:             ${{ secrets.FB_PAGE_ID }}
