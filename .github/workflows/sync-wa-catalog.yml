name: Sync WhatsApp Catalog

# Aggiorna il catalogo WhatsApp ogni 3 ore (stesso ritmo del chatbot)
# o manualmente da GitHub Actions > Run workflow
on:
  schedule:
    - cron: "30 */3 * * *"   # offset di 30 min rispetto al chatbot sync
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync prodotti → catalogo WhatsApp
        run: node scripts/sync-wa-catalog.mjs
        env:
          ILRAVIOLO_SUPABASE_KEY: ${{ secrets.ILRAVIOLO_SUPABASE_KEY }}
          META_ACCESS_TOKEN:      ${{ secrets.META_ACCESS_TOKEN }}
          WA_CATALOG_ID:          ${{ secrets.WA_CATALOG_ID }}

      # TEMP: verifica capacità del token Cloudflare (R2 + permessi). Da rimuovere.
      - name: Check Cloudflare (one-off)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "--- token verify ---"
          curl -s "https://api.cloudflare.com/client/v4/user/tokens/verify" -H "Authorization: Bearer $CF" | head -c 600; echo
          echo "--- R2 buckets ---"
          curl -s "https://api.cloudflare.com/client/v4/accounts/$ACC/r2/buckets" -H "Authorization: Bearer $CF" | head -c 800; echo
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACC: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
