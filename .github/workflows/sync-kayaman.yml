name: Sync Kayaman catalog

# Ogni 6 ore (e a mano) rilegge TUTTO il catalogo dall'API pubblica WooCommerce di kayamansfarm.com,
# aggiorna clients/kayaman.json e committa. Il commit fa partire il deploy su Cloudflare.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Rigenera catalogo Kayaman dall'API WooCommerce
        run: node scripts/build-kayaman.mjs
      - name: Commit + lancia il deploy se cambiato
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "AI Seller Bot"
          git config user.email "bot@blackstardigitalstudio.com"
          git add clients/kayaman.json
          if git diff --cached --quiet; then
            echo "Nessun cambiamento nel catalogo."
          else
            git commit -m "auto-sync catalogo Kayaman"
            git push
            gh workflow run "Deploy to Cloudflare Pages" --ref main
          fi
