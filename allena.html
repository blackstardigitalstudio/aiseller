<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI Seller · Entrena a Kaya</title>
<script>if(window.top!==window.self){ window.top.location=window.self.location.href; }</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&family=Alata&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<!-- STESSO stile del bot vero -->
<link rel="stylesheet" href="https://aiseller.pages.dev/styles.css">
<style>
  body{margin:0;min-height:100vh;font-family:var(--font-body,system-ui);color:var(--ink,#2b2b2b);background:linear-gradient(180deg,#f3ece3,#e9ded0);display:flex;flex-direction:column;align-items:center;padding:22px 12px 44px}
  .app{width:100%;max-width:432px}
  /* la stessa cornice chat del bot, ma statica e centrata */
  #panel{position:static;flex:none;height:76vh;min-height:520px;max-height:none;width:100%}
  .chat-head .gear{margin-left:auto}
  .tokbar{display:none;gap:8px;align-items:center;flex-wrap:wrap;padding:10px 13px;background:#fbf3e2;border-bottom:1px solid rgba(0,0,0,.06)}
  .tokbar.show{display:flex}
  .tokbar input{flex:1;min-width:150px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:.82rem;font-family:inherit}
  .st{font-size:.76rem;font-weight:700}
  .txt{display:block}
  .acts{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .btn{background:var(--sage);color:#fff;border:none;border-radius:var(--r-sm);padding:9px 15px;font-weight:700;cursor:pointer;font-size:.84rem;font-family:inherit}
  .btn.sm{padding:6px 11px;font-size:.76rem}
  .btn.gray{background:#efe8dc;color:#6b6456;border:1px solid var(--line);border-radius:var(--r-pill)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .fixin{margin-top:9px;display:flex;flex-direction:column;gap:7px}
  .fixin textarea,.fixin input{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:.88rem;font-family:inherit}
  .fixin textarea{min-height:64px;resize:vertical;line-height:1.45}
  .fixin label{font-size:.76rem;color:var(--muted)}
  .foot{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:13px 15px}
  .rowbtw{display:flex;align-items:center;justify-content:space-between;gap:10px}
  details summary{cursor:pointer;font-weight:700;font-size:.9rem;font-family:var(--font-head)}
  .kb-item{background:var(--chat-paper);border:1px solid var(--line);border-radius:12px;padding:10px;margin-top:9px}
  .kb-item .keys{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
  .tagk{background:#edefe6;color:var(--leaf);font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:var(--r-pill)}
  .kb-item .a{font-size:.86rem;line-height:1.45;white-space:pre-wrap}
  .kb-item .r{margin-top:8px}
  .empty{color:var(--muted);font-size:.85rem;padding:6px 0}
  .msgline{font-size:.82rem;font-weight:700;min-height:18px;margin-top:8px}
  .msgline.ok{color:var(--leaf)} .msgline.bad{color:var(--red)} .msgline.busy{color:var(--gold)}
  a.link{color:var(--leaf);font-weight:600;text-decoration:none}
  .note{color:var(--muted);font-size:.76rem;line-height:1.55;margin-top:12px;padding:0 4px}
  code{background:#efe8dc;padding:1px 6px;border-radius:5px;color:var(--leaf);font-size:.85em}
  .mic{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:1.05rem;cursor:pointer;flex:none;transition:var(--dur-fast,.15s)}
  .mic.rec{background:var(--red);color:#fff;border-color:var(--red);animation:micpulse 1s infinite}
  .mic.sm{width:34px;height:34px;font-size:.9rem;border-radius:50%}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(171,46,49,.4)}50%{box-shadow:0 0 0 6px rgba(171,46,49,0)}}
  .no-voice .mic{display:none}
</style></head>
<body>
<script>
(function(){
  var H='fb4f5fdb2c2508803d16317807680280f731f5486d98933f0f5bcd05a5f9d5ec',K='_as_auth';
  if(sessionStorage.getItem(K)==='1')return;
  document.documentElement.style.visibility='hidden';
  function gate(){
    var o=document.createElement('div');
    o.style.cssText='position:fixed;inset:0;background:#2b2b2b;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:system-ui,sans-serif';
    o.innerHTML='<div style="text-align:center;max-width:300px;width:90%;padding:0 20px"><div style="font-size:2.4rem;margin-bottom:10px">🌱</div><h2 style="color:#fff;margin:0 0 4px;font-size:1.15rem">Entrena a Kaya</h2><p style="color:#c9c2b6;font-size:.82rem;margin:0 0 22px">Área privada · Blackstar Digital Studio</p><input id="_pw" type="password" placeholder="Contraseña" autocomplete="current-password" style="width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #55504a;background:#3a3733;color:#fff;font-size:1rem;outline:none;margin-bottom:8px"><div id="_err" style="color:#e0573a;font-size:.8rem;min-height:16px;margin-bottom:8px"></div><button id="_ok" style="width:100%;padding:12px;border-radius:12px;border:none;background:#839669;color:#fff;font-weight:800;font-size:1rem;cursor:pointer">Entrar</button></div>';
    document.body.appendChild(o);
    document.documentElement.style.visibility='visible';
    setTimeout(function(){document.getElementById('_pw').focus();},80);
    async function check(){
      var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(document.getElementById('_pw').value));
      var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
      if(hex===H){sessionStorage.setItem(K,'1');o.remove();}
      else{document.getElementById('_err').textContent='Contraseña incorrecta';document.getElementById('_pw').select();}
    }
    document.getElementById('_ok').onclick=check;
    document.getElementById('_pw').onkeydown=function(e){if(e.key==='Enter')check();};
  }
  document.body?gate():document.addEventListener('DOMContentLoaded',gate);
})();
</script>

<div class="app">
  <div class="chat-inner" id="panel">
    <div class="chat-head">
      <div class="chat-id"><strong>Kaya · budtender</strong><span class="chat-status"><i class="dot"></i> en línea · entrenamiento</span></div>
      <button class="icon-btn gear" title="Ajustes (token)" onclick="document.getElementById('tokbar').classList.toggle('show')">⚙️</button>
    </div>
    <div class="tokbar" id="tokbar">
      <span>🔑</span>
      <input id="tok" type="password" placeholder="Token GitHub (para publicar)" />
      <button class="btn sm" onclick="saveTok()">Conectar</button>
      <span class="st" id="tokSt"></span>
    </div>
    <div id="log" class="chat-body"></div>
    <form class="chat-input" onsubmit="sendAsk();return false;">
      <button type="button" class="mic" onclick="dictate('ask',this)" title="Dictar por voz" aria-label="Dictar por voz">🎤</button>
      <input id="ask" type="text" placeholder="Escribe o dicta como un cliente…" autocomplete="off" />
      <button type="submit" class="chat-send" aria-label="Enviar">➤</button>
    </form>
  </div>

  <div class="foot">
    <details>
      <summary>📚 Conocimiento enseñado (<span id="cnt">0</span>)</summary>
      <div id="kbList" style="margin-top:10px"></div>
    </details>
    <div class="rowbtw" style="margin-top:12px">
      <a class="link" id="tryLink" target="_blank">▶ Abrir el bot real</a>
      <button class="btn" id="pub" onclick="publish()">🚀 Publicar</button>
    </div>
    <div class="msgline" id="msg"></div>
  </div>

  <div class="note">
    📸 <b>Capturas de chats con clientes:</b> no las subas aquí (datos personales, página pública). Envíalas en privado, las convierto en conocimiento anónimo. · 🔑 Token: clásico con scope <code>repo</code>.
  </div>
</div>

<script>
  var REPO="blackstardigitalstudio/aiseller", CDN="https://aiseller.pages.dev", PATH="clients/kayaman.json", LANG="es";
  var CFG=null, KB=[], PRODUCTS=[], turns=[];
  var STOP=["que","como","con","para","una","uno","del","los","las","por","cual","cómo","qué","mi","te","se","un","es","y","o","en","de","el","la","lo","al","muy","más","the","and","you","for","si","sí","tiene","hay"];

  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function b64enc(str){ return btoa(unescape(encodeURIComponent(str))); }
  function tok(){ return localStorage.getItem("AISELLER_GH_TOKEN")||""; }
  function saveTok(){ var v=document.getElementById("tok").value.trim(); if(v) localStorage.setItem("AISELLER_GH_TOKEN",v); renderTok(); }
  function renderTok(){ var s=document.getElementById("tokSt"); if(tok()){ s.textContent="✓ conectado"; s.style.color="var(--leaf)"; } else { s.textContent="pega el token para publicar"; s.style.color="var(--muted)"; } }
  function msg(t,c){ var m=document.getElementById("msg"); m.textContent=t||""; m.className="msgline "+(c||""); }
  function safetyText(){ var n=CFG&&CFG.safetyNote; if(!n) return "🌱 Recuerda: es un artículo de colección, no destinado al consumo."; return (typeof n==="object")?(n[LANG]||n.es||n.it):n; }

  async function load(){
    document.getElementById("tryLink").href=CDN+"/?widget=1&config="+encodeURIComponent(CDN+"/"+PATH)+"&accent=%23a8915f";
    try{ var r=await fetch(CDN+"/"+PATH+"?cb="+Date.now()); CFG=r.ok?await r.json():{brand:"Kayaman's Farm"}; }catch(e){ CFG={brand:"Kayaman's Farm"}; }
    KB=Array.isArray(CFG.knowledge)?CFG.knowledge:[];
    PRODUCTS=Array.isArray(CFG.products)?CFG.products:[];
    renderKB();
    addBot({text:"¡Hola jefe! 👋 Escríbeme una pregunta como haría un cliente y te muestro cómo respondo. Si hace falta, corrígeme 😊"});
  }

  function words(s){ return String(s||"").toLowerCase().split(/[^a-z0-9àáèéìíòóùúñç%]+/i).filter(w=>w.length>=3 && STOP.indexOf(w)<0); }
  function kbAnswer(e){ var a=e.a||""; if(a&&typeof a==="object")a=a[LANG]||a.es||a.it||""; if(e.safe)a=a+"\n\n"+safetyText(); return a; }
  function bestKB(low){ var best=null,score=0; KB.forEach(function(e){ var s=0;(e.keys||[]).forEach(function(k){k=String(k).toLowerCase().trim(); if(k&&low.indexOf(k)>=0)s+=2;}); if(s>score){score=s;best=e;} }); return score>=2?{e:best,i:KB.indexOf(best)}:null; }
  function bestProduct(low){ var qw=words(low); if(!qw.length)return null; var best=null,score=0; PRODUCTS.forEach(function(p){ if(p.stock===0)return; var hay=((p.name||"")+" "+((p.keys||[]).join(" "))+" "+(p.category||"")).toLowerCase(); var s=0; qw.forEach(function(w){ if(hay.indexOf(w)>=0)s++; }); if(s>score){score=s;best=p;} }); return score>=1?best:null; }

  function computeAnswer(low){
    var k=bestKB(low);
    if(k) return { text:kbAnswer(k.e), source:"sapere", kbi:k.i };
    var p=bestProduct(low);
    if(p) return { text:"Te recomiendo **"+p.name+"**"+(p.price?" ("+p.price+"€)":"")+". "+String(p.description||"").slice(0,150), source:"prodotto" };
    return { text:"Sobre esto todavía no tengo una respuesta específica 🤔 Enséñamela: pulsa ✏️ Corregir y escribe qué debería decir.", source:"vuoto" };
  }

  function addUser(text){ var d=document.createElement("div"); d.className="msg user"; d.textContent=text; document.getElementById("log").appendChild(d); scroll(); }
  function addBot(o){
    var i=turns.length; turns.push(o);
    var d=document.createElement("div"); d.className="msg bot"; d.id="turn-"+i;
    d.innerHTML='<span class="txt">'+fmt(o.text)+'</span>'
      +(o.q!==undefined?('<span class="acts"><button class="btn gray sm" onclick="startFix('+i+',false)">✏️ Corregir</button><button class="btn gray sm" onclick="startFix('+i+',true)">➕ Añadir detalle</button></span><div class="fixin" id="fix-'+i+'" style="display:none"></div>'):'');
    document.getElementById("log").appendChild(d); scroll();
  }
  function fmt(t){ return esc(t).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\n/g,"<br>"); }
  function scroll(){ var l=document.getElementById("log"); l.scrollTop=l.scrollHeight; }

  // ---- dettato vocale (browser, gratis) → riempie un campo parlando in spagnolo ----
  var Recog = window.SpeechRecognition || window.webkitSpeechRecognition;
  var rec = null;
  function dictate(targetId, btn){
    if(!Recog){ msg("Tu navegador no permite dictado por voz. Usa Chrome (o escribe).","bad"); return; }
    if(rec){ try{ rec.stop(); }catch(e){} return; }   // toggle: seconda pressione = stop
    var target=document.getElementById(targetId); if(!target) return;
    var base = target.value ? target.value.replace(/\s+$/,"")+" " : "";
    rec = new Recog(); rec.lang="es-ES"; rec.interimResults=true; rec.continuous=false; rec.maxAlternatives=1;
    btn.classList.add("rec");
    rec.onresult=function(e){ var t=""; for(var i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript; target.value=base+t; target.dispatchEvent(new Event("input")); };
    rec.onend=function(){ btn.classList.remove("rec"); rec=null; target.focus(); };
    rec.onerror=function(ev){ btn.classList.remove("rec"); rec=null; if(ev&&ev.error==="not-allowed") msg("Permite el micrófono en el navegador para dictar 🎤","bad"); };
    try{ rec.start(); }catch(e){ btn.classList.remove("rec"); rec=null; }
  }

  function sendAsk(){
    var inp=document.getElementById("ask"); var q=inp.value.trim(); if(!q)return; inp.value="";
    addUser(q);
    var ans=computeAnswer(q.toLowerCase());
    addBot({ text:ans.text, source:ans.source, kbi:ans.kbi, q:q });
  }

  function startFix(i, addDetail){
    var t=turns[i]; var box=document.getElementById("fix-"+i); if(!box)return;
    var cur=(t.source==="sapere"||!addDetail)? rawText(i) : "";
    box.style.display=""; box.innerHTML="";
    var chk='<label style="display:flex;gap:6px;align-items:center;margin-top:2px"><input type="checkbox" id="fs-'+i+'" checked> añadir al final la nota de seguridad (“solo de colección”)</label>';
    if(addDetail){
      box.innerHTML='<input type="text" id="fi-'+i+'" placeholder="Un detalle que pesa en la venta (ej. es el más vendido, sabe a limón)…" />'+chk
        +'<div class="acts"><button type="button" class="mic sm" onclick="dictate(\'fi-'+i+'\',this)" title="Dictar por voz">🎤</button><button class="btn sm" onclick="saveFix('+i+',true)">Guardar detalle</button><button class="btn gray sm" onclick="cancelFix('+i+')">Cancelar</button></div>';
      document.getElementById("fi-"+i).focus();
    } else {
      box.innerHTML='<textarea id="ft-'+i+'">'+esc(cur)+'</textarea>'+chk
        +'<div class="acts"><button type="button" class="mic sm" onclick="dictate(\'ft-'+i+'\',this)" title="Dictar por voz">🎤</button><button class="btn sm" onclick="saveFix('+i+',false)">Guardar corrección</button><button class="btn gray sm" onclick="cancelFix('+i+')">Cancelar</button></div>';
      var ta=document.getElementById("ft-"+i); ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length);
    }
  }
  function rawText(i){ var t=turns[i]; if(t.source==="sapere"&&t.kbi!=null){ var a=KB[t.kbi].a; return (a&&typeof a==="object")?(a[LANG]||a.es||a.it||""):a; } return t.text.replace(/\n\n🌱[\s\S]*$/,""); }
  function cancelFix(i){ var b=document.getElementById("fix-"+i); if(b){b.style.display="none";b.innerHTML="";} }
  function saveFix(i, addDetail){
    var t=turns[i];
    var val = addDetail ? (document.getElementById("fi-"+i).value||"").trim() : (document.getElementById("ft-"+i).value||"").trim();
    if(!val){ return; }
    var safe = document.getElementById("fs-"+i) ? document.getElementById("fs-"+i).checked : true;
    var answer = addDetail ? (rawText(i)+" "+val).trim() : val;
    var keys=[...new Set(words(t.q||""))].slice(0,6);
    if(!keys.length) keys=[ (t.q||"").toLowerCase().slice(0,20) ];
    if(t.source==="sapere" && t.kbi!=null && KB[t.kbi]){ KB[t.kbi].a=answer; KB[t.kbi].safe=safe; }
    else { KB.push({ keys:keys, a:answer, safe:safe }); t.kbi=KB.length-1; t.source="sapere"; }
    var d=document.getElementById("turn-"+i); if(d){ var txt=d.querySelector(".txt"); if(txt) txt.innerHTML=fmt(answer+(safe?("\n\n"+safetyText()):"")); }
    cancelFix(i); renderKB();
    msg("¡Aprendido! ✔ (pulsa 🚀 Publicar para ponerlo online)","ok");
  }

  function renderKB(){
    document.getElementById("cnt").textContent=KB.length;
    var el=document.getElementById("kbList");
    if(!KB.length){ el.innerHTML='<div class="empty">Todavía nada. Haz una pregunta arriba y corrige la respuesta 👆</div>'; return; }
    el.innerHTML=KB.map(function(e,i){
      var keys=(e.keys||[]).map(function(k){return '<span class="tagk">'+esc(k)+'</span>';}).join("");
      var a=e.a||""; if(a&&typeof a==="object")a=a[LANG]||a.es||a.it||"";
      return '<div class="kb-item"><div class="keys">'+keys+'</div><div class="a">'+esc(a)+'</div>'
        +'<div class="r"><button class="btn gray sm" onclick="delKB('+i+')">🗑️ Eliminar</button></div></div>';
    }).join("");
  }
  function delKB(i){ KB.splice(i,1); renderKB(); msg("Eliminado (pulsa 🚀 Publicar para confirmar)","ok"); }

  async function publish(){
    if(!tok()){ msg("Pega antes el token GitHub (arriba).","bad"); return; }
    if(!CFG){ msg("Configuración no cargada, recarga la página.","bad"); return; }
    CFG.knowledge=KB;
    var btn=document.getElementById("pub"); btn.disabled=true; msg("Publicando…","busy");
    try{
      var api="https://api.github.com/repos/"+REPO+"/contents/"+PATH;
      var g=await fetch(api,{headers:{Authorization:"Bearer "+tok(),Accept:"application/vnd.github+json"}});
      var sha=g.ok?(await g.json()).sha:undefined;
      var put=await fetch(api,{method:"PUT",headers:{Authorization:"Bearer "+tok(),Accept:"application/vnd.github+json"},
        body:JSON.stringify({message:"allena: actualiza conocimiento Kaya", content:b64enc(JSON.stringify(CFG,null,2)), sha:sha})});
      if(!put.ok){ var er=await put.json(); throw new Error(er.message||put.status); }
      msg("✓ ¡Publicado! Online en ~1 minuto (Ctrl+F5 en el bot).","ok");
    }catch(e){ msg("Error: "+e.message,"bad"); }
    btn.disabled=false;
  }

  if(!Recog) document.body.classList.add("no-voice");   // niente dettato → nascondi i microfoni
  document.getElementById("tok").value=tok(); renderTok(); load();
</script>
</body></html>
